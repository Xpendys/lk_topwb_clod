{% extends "lk_base.html" %}
{% set active_page = 'requisites' %}
{% block title %}Реквизиты — Топай в ТОП{% endblock %}

{% block lk_content %}
<h1>Реквизиты для выплат</h1>
<p class="muted">Укажите куда переводить деньги. Менеджер увидит эти данные при формировании выплаты.</p>

<section class="card" style="max-width: 520px;">
    <form method="post" action="/lk/requisites">
        <label>
            Банк получателя
            <input type="text" name="requisites_bank" placeholder="Сбербанк / Тинькофф / СБП..."
                   value="{{ req.requisites_bank or '' }}">
        </label>
        <label>
            Номер телефона
            <input type="tel" name="requisites_phone" id="phone_input"
                   placeholder="+7 (___) ___-__-__"
                   value="{{ req.requisites_phone or '' }}" required autocomplete="tel">
        </label>
        <label>
            ФИО получателя
            <input type="text" name="requisites_name" placeholder="Иванов Иван Иванович"
                   value="{{ req.requisites_name or '' }}" required>
        </label>
        <button type="submit" class="btn-primary" style="margin-top:8px;">Сохранить</button>
    </form>
</section>

<script>
(function() {
    var inp = document.getElementById('phone_input');
    if (!inp) return;

    function format(val) {
        var d = val.replace(/\D/g, '');
        if (d.length === 0) return '';
        if (d[0] === '8') d = '7' + d.slice(1);
        if (d[0] !== '7') d = '7' + d;
        d = d.slice(0, 11);
        var res = '+7';
        if (d.length > 1) res += ' (' + d.slice(1, Math.min(4, d.length));
        if (d.length >= 4) res += ') ' + d.slice(4, Math.min(7, d.length));
        if (d.length >= 7) res += '-' + d.slice(7, Math.min(9, d.length));
        if (d.length >= 9) res += '-' + d.slice(9, 11);
        return res;
    }

    // форматируем уже сохранённое значение
    if (inp.value) inp.value = format(inp.value);

    inp.addEventListener('input', function(e) {
        var pos = inp.selectionStart;
        inp.value = format(inp.value);
        // сдвигаем курсор в конец при вводе
        inp.setSelectionRange(inp.value.length, inp.value.length);
    });

    inp.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && inp.value.length <= 3) {
            inp.value = '';
            e.preventDefault();
        }
    });
})();
</script>
{% endblock lk_content %}
