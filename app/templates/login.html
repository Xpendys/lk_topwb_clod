{% extends "base.html" %}
{% block title %}Вход — Топай в ТОП{% endblock %}

{% block content %}
<div class="card narrow">
    <h1>Вход в кабинет</h1>
    <form method="post" action="/login">
        <label>
            Email
            <input type="email" name="email" required value="{{ form.email or '' }}">
        </label>
        <label>
            Пароль
            <input type="password" name="password" required>
        </label>
        <button type="submit" class="btn-primary big full">Войти</button>
    </form>
    <p class="muted center">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
</div>
{% endblock %}
