<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Реферальная программа ТопВТоп{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="topbar">
        <a href="/" class="brand">ТопВТоп · Реферальная программа</a>
        <nav>
            {% if user %}
                <span class="user-name">{{ user.first_name }} {{ user.last_name }}</span>
                <form method="post" action="/logout" style="display:inline">
                    <button type="submit" class="link-btn">Выйти</button>
                </form>
            {% else %}
                <a href="/login">Войти</a>
                <a href="/register" class="btn-primary">Регистрация</a>
            {% endif %}
        </nav>
    </header>

    <main class="container">
        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        {% if message %}
            <div class="alert alert-info">{{ message }}</div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <small>© ТопВТоп · По вопросам — Telegram @Oleg_toptopwb</small>
    </footer>
</body>
</html>
