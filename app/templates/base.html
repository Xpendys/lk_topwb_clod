<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Реферальная программа — Топай в ТОП{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="topbar">
        <a href="/" class="brand">
            <img src="/static/logo.png" alt="Топай в ТОП" class="brand-logo">
            <span class="brand-text">Топай в ТОП <span class="brand-sub">· Реферальная программа</span></span>
        </a>
        <nav>
            {% if user %}
                <span class="user-name">{{ user.first_name }} {{ user.last_name }}</span>
                <form method="post" action="/logout" style="display:inline">
                    <button type="submit" class="link-btn">Выйти</button>
                </form>
            {% else %}
                <a href="/login">Войти</a>
                <a href="/register" class="btn-primary">Регистрация</a>
            {% endif %}
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <small>© Топай в ТОП · По вопросам — Telegram @Oleg_toptopwb</small>
    </footer>
</body>
</html>
